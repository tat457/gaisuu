<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="東京土産の概算を使って、5つの商品が予算内に収まるか考える学習ゲームです。"
    />
    <title>東京土産の概算で予算内に収まるかゲーム</title>
    <style>
      :root {
        --primary: #e11d48; /* 東京らしい赤・ピンク系のアクセンカラーに調整 */
        --primary-hover: #be123c;
        --success: #10b981;
        --success-hover: #059669;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --neutral-900: #111827;
        --neutral-800: #1f2937;
        --neutral-700: #374151;
        --neutral-100: #f3f4f6;
        --neutral-50: #f9fafb;
        --accent: #d97706;
        --accent-light: #fef3c7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: #f5f5f7;
        color: var(--neutral-800);
        line-height: 1.6;
        padding: 1rem;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .app {
        width: 100%;
        max-width: 650px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .game-board {
        padding: 2rem;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--neutral-100);
        padding-bottom: 1.2rem;
        margin-bottom: 1.5rem;
      }

      .eyebrow {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.2rem;
      }

      h1 {
        font-size: 1.5rem;
        color: var(--neutral-900);
        font-weight: 800;
      }

      .icon-button {
        background-color: var(--neutral-100);
        border: none;
        color: var(--neutral-700);
        font-size: 1.5rem;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
      }

      .icon-button:hover {
        background-color: #e5e7eb;
        transform: rotate(45deg);
      }

      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .budget-panel, .score-panel {
        background-color: var(--neutral-50);
        border: 2px solid var(--neutral-100);
        border-radius: 12px;
        padding: 1rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .budget-panel span, .score-panel span {
        font-size: 0.85rem;
        color: var(--neutral-700);
        font-weight: 600;
        margin-bottom: 0.25rem;
      }

      .budget-panel strong {
        font-size: 1.8rem;
        color: var(--accent);
        font-weight: 800;
      }

      .score-panel strong {
        font-size: 1.8rem;
        color: var(--primary);
        font-weight: 800;
      }

      .products-section {
        margin-bottom: 1.8rem;
      }

      .section-head {
        margin-bottom: 1rem;
      }

      .section-head h2 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--neutral-900);
        margin-bottom: 0.2rem;
      }

      .section-head p {
        font-size: 0.85rem;
        color: #6b7280;
      }

      .product-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .product-item {
        display: grid;
        grid-template-columns: 60px 1.5fr 1fr 1.2fr;
        align-items: center;
        gap: 0.75rem;
        background-color: var(--neutral-50);
        border: 1px solid var(--neutral-100);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        transition: border-color 0.2s;
      }

      .product-item:focus-within {
        border-color: var(--primary);
      }

      /* 写真表示用のスタイル */
      .product-image-container {
        width: 50px;
        height: 50px;
        border-radius: 8px;
        overflow: hidden;
        background-color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #d1d5db;
      }

      .product-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .product-name {
        font-weight: 600;
        color: var(--neutral-900);
        font-size: 0.95rem;
      }

      .product-price {
        font-size: 0.95rem;
        color: var(--neutral-700);
        font-weight: bold;
        text-align: right;
        padding-right: 0.5rem;
      }

      .approx-input-container {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .approx-input {
        width: 100%;
        padding: 0.4rem 0.5rem;
        border: 2px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: bold;
        text-align: right;
        outline: none;
        transition: border-color 0.2s;
      }

      .approx-input:focus {
        border-color: var(--primary);
      }

      .approx-input.correct {
        border-color: var(--success);
        background-color: #ecfdf5;
      }

      .approx-input.incorrect {
        border-color: var(--danger);
        background-color: #fef2f2;
      }

      .approx-unit {
        font-size: 0.8rem;
        color: var(--neutral-700);
        font-weight: 600;
        white-space: nowrap;
      }

      .answer-section {
        background-color: #fdf2f2;
        border-radius: 16px;
        padding: 1.5rem;
        border: 2px dashed #fca5a5;
      }

      .answer-section h2 {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--neutral-900);
        margin-bottom: 0.8rem;
        text-align: center;
      }

      .choice-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .choice-button {
        padding: 1rem;
        font-size: 1.15rem;
        font-weight: 800;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        color: white;
      }

      .choice-button.yes {
        background-color: var(--success);
      }

      .choice-button.yes:hover {
        background-color: var(--success-hover);
        transform: translateY(-2px);
      }

      .choice-button.no {
        background-color: var(--danger);
      }

      .choice-button.no:hover {
        background-color: var(--danger-hover);
        transform: translateY(-2px);
      }

      .choice-button:active {
        transform: translateY(0);
      }

      .choice-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .result {
        border-radius: 12px;
        margin-top: 1rem;
        font-size: 1rem;
        font-weight: 600;
        display: none;
        animation: fadeIn 0.3s ease-out;
      }

      .result.show {
        display: block;
      }

      .result-banner {
        padding: 1rem;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 1rem;
        font-size: 1.2rem;
        font-weight: bold;
      }

      .result-banner.win {
        background-color: #d1fae5;
        color: #065f46;
        border: 2px solid #34d399;
      }

      .result-banner.lose {
        background-color: #fee2e2;
        color: #991b1b;
        border: 2px solid #f87171;
      }

      .details-panel {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1rem;
        font-size: 0.9rem;
      }

      .details-panel h3 {
        font-size: 1rem;
        margin-bottom: 0.5rem;
        color: var(--neutral-900);
        border-bottom: 1px solid #edf2f7;
        padding-bottom: 0.25rem;
      }

      .details-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 0.75rem;
      }

      .details-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.25rem 0;
        border-bottom: 1px solid #f3f4f6;
      }

      .math-summary {
        background-color: var(--neutral-50);
        padding: 0.75rem;
        border-radius: 8px;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .math-line {
        display: flex;
        justify-content: space-between;
      }

      .math-line.highlight {
        color: var(--primary);
        border-top: 1px dashed #cbd5e1;
        padding-top: 0.25rem;
        margin-top: 0.25rem;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 500px) {
        .game-board {
          padding: 1.2rem;
        }
        .product-item {
          grid-template-columns: 50px 1.2fr 0.8fr 1.2fr;
          gap: 0.5rem;
          padding: 0.6rem;
        }
        .product-image-container {
          width: 44px;
          height: 44px;
        }
        .product-name, .product-price, .approx-input {
          font-size: 0.85rem;
        }
        h1 {
          font-size: 1.25rem;
        }
        .budget-panel strong, .score-panel strong {
          font-size: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="game-board" aria-labelledby="game-title">
        <div class="top-bar">
          <div>
            <p class="eyebrow">東京土産編 ✈️ 算数概算</p>
            <h1 id="game-title">予算内でお土産買える？</h1>
          </div>
          <button class="icon-button" id="new-game-button" type="button" aria-label="新しい問題">
            ↻
          </button>
        </div>

        <div class="status-grid" aria-label="現在の問題">
          <div class="budget-panel">
            <span>今回の予算</span>
            <strong id="budget-text">0円</strong>
          </div>
          <div class="score-panel">
            <span>スコア</span>
            <strong id="score-text">0 / 0</strong>
          </div>
        </div>

        <section class="products-section" aria-labelledby="products-title">
          <div class="section-head">
            <h2 id="products-title">お土産と概数（がいすう）</h2>
            <p>お土産の金額を<b>四捨五入して千の位まで</b>にして入力しよう！<br>(例：1480円 → 1000円 / 2500円 → 3000円)</p>
          </div>
          <ul class="product-list" id="product-list">
            <!-- JavaScriptでここに動的に商品が追加されます -->
          </ul>
        </section>

        <section class="answer-section" aria-labelledby="answer-title">
          <h2 id="answer-title">お買い物見積もり：予算内で買える？</h2>
          <div class="choice-row">
            <button class="choice-button yes" id="yes-button" type="button">買える</button>
            <button class="choice-button no" id="no-button" type="button">買えない</button>
          </div>
          <div class="result" id="result" role="status" aria-live="polite">
            <!-- 結果がここに表示されます -->
          </div>
        </section>
      </section>
    </main>

    <script>
      // 東京土産データベース24選 (名前, 価格設定, 画像ファイル名, フォールバック用絵文字)
      const PRODUCT_DATABASE = [
        { name: "東京ばな奈 (8個入)", minPrice: 1100, maxPrice: 1300, image: "images/souvenir_1.jpg", emoji: "🍌" },
        { name: "東京ひよ子 (9個入)", minPrice: 1200, maxPrice: 1500, image: "images/souvenir_2.jpg", emoji: "🐤" },
        { name: "雷おこし 詰め合わせ", minPrice: 800, maxPrice: 1200, image: "images/souvenir_3.jpg", emoji: "⚡" },
        { name: "江戸祭 人形焼", minPrice: 1000, maxPrice: 1400, image: "images/souvenir_4.jpg", emoji: "👺" },
        { name: "芋ようかん (6個入)", minPrice: 800, maxPrice: 1100, image: "images/souvenir_5.jpg", emoji: "🍠" },
        { name: "とらや 小形羊羹", minPrice: 3000, maxPrice: 3500, image: "images/souvenir_6.jpg", emoji: "🍵" },
        { name: "ごまたまご (12個入)", minPrice: 1200, maxPrice: 1600, image: "images/souvenir_7.jpg", emoji: "🥚" },
        { name: "ちとせ 天ぷらせんべい", minPrice: 1200, maxPrice: 1800, image: "images/souvenir_8.jpg", emoji: "🍤" },
        { name: "バウムクーヘン詰め合わせ", minPrice: 2000, maxPrice: 3000, image: "images/souvenir_9.jpg", emoji: "🍩" },
        { name: "資生堂パーラー サブレ", minPrice: 1100, maxPrice: 1600, image: "images/souvenir_10.jpg", emoji: "🍪" },
        { name: "帝国ホテル クッキー缶", minPrice: 2500, maxPrice: 3800, image: "images/souvenir_11.jpg", emoji: "🏰" },
        { name: "銀座ウエスト リーフパイ", minPrice: 1500, maxPrice: 2400, image: "images/souvenir_12.jpg", emoji: "🍃" },
        { name: "東京レンガぱん (4個入)", minPrice: 1200, maxPrice: 1600, image: "images/souvenir_13.jpg", emoji: "🧱" },
        { name: "ミルフィユ 詰め合わせ", minPrice: 1600, maxPrice: 2200, image: "images/souvenir_14.jpg", emoji: "🍫" },
        { name: "シガール クッキー", minPrice: 1800, maxPrice: 2400, image: "images/souvenir_15.jpg", emoji: "🧣" },
        { name: "プレスバターサンド", minPrice: 1700, maxPrice: 2200, image: "images/souvenir_16.jpg", emoji: "🧈" },
        { name: "キャラメルサンドクッキー", minPrice: 1600, maxPrice: 2800, image: "images/souvenir_17.jpg", emoji: "🍮" },
        { name: "メープルバタークッキー", minPrice: 1000, maxPrice: 1800, image: "images/souvenir_18.jpg", emoji: "🍁" },
        { name: "東京ラスク プレミアム", minPrice: 1200, maxPrice: 2000, image: "images/souvenir_19.jpg", emoji: "🍞" },
        { name: "日本橋 錦豊琳かりんとう", minPrice: 1400, maxPrice: 2200, image: "images/souvenir_20.jpg", emoji: "🥨" },
        { name: "東京あられ 詰め合わせ", minPrice: 1000, maxPrice: 1500, image: "images/souvenir_21.jpg", emoji: "🍡" },
        { name: "東京ハニーベア", minPrice: 1200, maxPrice: 1800, image: "images/souvenir_22.jpg", emoji: "🧸" },
        { name: "銀座いちごケーキ", minPrice: 1100, maxPrice: 1500, image: "images/souvenir_23.jpg", emoji: "🍓" },
        { name: "江戸前 高級海苔セット", minPrice: 2500, maxPrice: 4500, image: "images/souvenir_24.jpg", emoji: "🌊" }
      ];

      // ゲーム状態の管理
      let currentProducts = [];
      let budget = 0;
      let score = 0;
      let totalQuestions = 0;
      let hasAnswered = false;

      // DOM要素の取得
      const budgetText = document.getElementById("budget-text");
      const scoreText = document.getElementById("score-text");
      const productList = document.getElementById("product-list");
      const resultDiv = document.getElementById("result");
      const yesButton = document.getElementById("yes-button");
      const noButton = document.getElementById("no-button");
      const newGameButton = document.getElementById("new-game-button");

      // 百の位を四捨五入して、千の位までの概数にする関数
      function roundToThousand(num) {
        return Math.round(num / 1000) * 1000;
      }

      // ランダムな値の生成
      function getRandomPrice(min, max) {
        const base = Math.floor(Math.random() * (max - min + 1)) + min;
        return Math.floor(base / 10) * 10; // 10円単位に調整
      }

      // 新しいゲーム(問題)の作成
      function startNewGame() {
        hasAnswered = false;
        resultDiv.classList.remove("show");
        resultDiv.innerHTML = "";
        yesButton.disabled = false;
        noButton.disabled = false;

        // 24種類の商品から重複なしで5個をランダムに選択
        const shuffled = [...PRODUCT_DATABASE].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 5);

        currentProducts = selected.map(item => {
          const price = getRandomPrice(item.minPrice, item.maxPrice);
          const correctApprox = roundToThousand(price);
          return {
            name: item.name,
            image: item.image,
            emoji: item.emoji,
            price: price,
            correctApprox: correctApprox
          };
        });

        // 合計金額の計算
        const actualTotal = currentProducts.reduce((sum, p) => sum + p.price, 0);
        const approxTotal = currentProducts.reduce((sum, p) => sum + p.correctApprox, 0);

        // 予算の設定: 
        const decisionMargin = Math.random() > 0.5 ? 1000 : -1000;
        budget = Math.max(4000, approxTotal + decisionMargin);

        // 画面への反映
        budgetText.textContent = budget.toLocaleString() + "円";
        renderProducts();
      }

      // 商品リストの表示
      function renderProducts() {
        productList.innerHTML = "";
        currentProducts.forEach((product, index) => {
          const li = document.createElement("li");
          li.className = "product-item";
          
          // 万が一画像が存在しなかった場合のフォールバック用プレースホルダー画像URL
          // 東京タワーを連想させるお土産風プレースホルダー
          const fallbackPlaceholder = "https://images.unsplash.com/photo-1503899036084-c55cdd92da26?auto=format&fit=crop&w=150&q=80";

          li.innerHTML = `
            <div class="product-image-container">
              <img 
                src="${product.image}" 
                class="product-image" 
                alt="${product.name}" 
                onerror="this.onerror=null; this.src='${fallbackPlaceholder}';" 
              />
            </div>
            <span class="product-name">${product.emoji} ${product.name}</span>
            <span class="product-price">${product.price.toLocaleString()}円</span>
            <div class="approx-input-container">
              <input 
                type="number" 
                class="approx-input" 
                id="approx-input-${index}" 
                placeholder="千の位" 
                min="0" 
                step="1000"
                aria-label="${product.name}の概数"
              />
              <span class="approx-unit">円</span>
            </div>
          `;
          productList.appendChild(li);
        });
      }

      // ユーザーの概数入力チェック
      function checkApproxInputs() {
        let allCorrect = true;
        const userApproxList = [];

        currentProducts.forEach((product, index) => {
          const inputEl = document.getElementById(`approx-input-${index}`);
          const userVal = parseInt(inputEl.value, 10);
          
          if (isNaN(userVal) || userVal !== product.correctApprox) {
            allCorrect = false;
            inputEl.classList.add("incorrect");
            inputEl.classList.remove("correct");
          } else {
            inputEl.classList.add("correct");
            inputEl.classList.remove("incorrect");
          }
          userApproxList.push(isNaN(userVal) ? 0 : userVal);
        });

        return { allCorrect, userApproxList };
      }

      // 回答に対する判定処理
      function handleAnswer(userChoice) {
        if (hasAnswered) return;

        // 1. 各商品の概数入力が正しいか確認
        const { allCorrect, userApproxList } = checkApproxInputs();

        // 2. 実際の金額と概数の金額の計算
        const actualTotal = currentProducts.reduce((sum, p) => sum + p.price, 0);
        const correctApproxTotal = currentProducts.reduce((sum, p) => sum + p.correctApprox, 0);
        
        // 予算内かどうかの判定
        const canBuyBasedOnApprox = correctApproxTotal <= budget;
        const canBuyBasedOnActual = actualTotal <= budget;
        const isActuallyCorrectToBuy = canBuyBasedOnApprox && canBuyBasedOnActual;

        // ユーザーの選択が正しかったか
        const choiceIsCorrect = (userChoice === "yes" && isActuallyCorrectToBuy) || 
                                  (userChoice === "no" && !isActuallyCorrectToBuy);

        // 完全正解判定
        const isPerfect = allCorrect && choiceIsCorrect;

        hasAnswered = true;
        totalQuestions++;
        if (isPerfect) {
          score++;
        }

        // スコア更新
        scoreText.textContent = `${score} / ${totalQuestions}`;

        // ボタンの無効化と入力のロック
        yesButton.disabled = true;
        noButton.disabled = true;
        currentProducts.forEach((_, index) => {
          document.getElementById(`approx-input-${index}`).disabled = true;
        });

        // 結果詳細のUI表示
        showResultDetails(isPerfect, allCorrect, choiceIsCorrect, actualTotal, correctApproxTotal, isActuallyCorrectToBuy);
      }

      // 結果詳細表示の生成
      function showResultDetails(isPerfect, allCorrect, choiceIsCorrect, actualTotal, correctApproxTotal, isActuallyCorrectToBuy) {
        resultDiv.innerHTML = "";
        
        // タイトルバナー
        const banner = document.createElement("div");
        banner.className = `result-banner ${isPerfect ? 'win' : 'lose'}`;
        if (isPerfect) {
          banner.textContent = "🎉 大正解！見積もりマスター！";
        } else if (!allCorrect && choiceIsCorrect) {
          banner.textContent = "⚠️ 判定は合っていましたが、お土産の概数計算に間違いがあります！";
        } else if (allCorrect && !choiceIsCorrect) {
          banner.textContent = "❌ 概数は完璧でしたが、予算内に入るかの判定を間違えました！";
        } else {
          banner.textContent = "❌ 残念！もう一度お土産の金額を見積もってみよう！";
        }
        resultDiv.appendChild(banner);

        // 詳細パネル
        const details = document.createElement("div");
        details.className = "details-panel";
        
        let detailsHtml = `
          <h3>お土産の見積もり詳細</h3>
          <ul class="details-list">
        `;

        currentProducts.forEach((product, index) => {
          const inputEl = document.getElementById(`approx-input-${index}`);
          const userVal = parseInt(inputEl.value, 10) || 0;
          const isInputCorrect = userVal === product.correctApprox;

          detailsHtml += `
            <li class="details-item">
              <span style="display: flex; align-items: center; gap: 0.5rem;">
                <img src="${product.image}" style="width: 24px; height: 24px; object-fit: cover; border-radius: 4px;" onerror="this.style.display='none';" />
                <span>${product.name} (${product.price.toLocaleString()}円)</span>
              </span>
              <span>
                入力: <b style="color: ${isInputCorrect ? 'var(--success)' : 'var(--danger)'}">${userVal.toLocaleString()}円</b> 
                (正解: <b>${product.correctApprox.toLocaleString()}円</b>)
              </span>
            </li>
          `;
        });

        const actualStatusText = actualTotal <= budget ? "予算内" : "予算オーバー";
        const approxStatusText = correctApproxTotal <= budget ? "予算内" : "予算オーバー";

        detailsHtml += `
          </ul>
          <div class="math-summary">
            <div class="math-line">
              <span>概算（およそ）の合計:</span>
              <span><b>${correctApproxTotal.toLocaleString()}円</b> (${approxStatusText})</span>
            </div>
            <div class="math-line">
              <span>実際の合計金額:</span>
              <span><b>${actualTotal.toLocaleString()}円</b> (${actualStatusText})</span>
            </div>
            <div class="math-line">
              <span>今回の予算:</span>
              <span style="color: var(--accent)"><b>${budget.toLocaleString()}円</b></span>
            </div>
            <div class="math-line highlight">
              <span>結論（買える？）：</span>
              <span style="color: ${isActuallyCorrectToBuy ? 'var(--success)' : 'var(--danger)'}">
                <b>${isActuallyCorrectToBuy ? '買えます！' : '買えません！'}</b>
              </span>
            </div>
          </div>
        `;

        details.innerHTML = detailsHtml;
        resultDiv.appendChild(details);
        resultDiv.classList.add("show");
      }

      // イベントリスナーの設定
      yesButton.addEventListener("click", () => handleAnswer("yes"));
      noButton.addEventListener("click", () => handleAnswer("no"));
      newGameButton.addEventListener("click", startNewGame);

      // ゲームの初期スタート
      window.onload = () => {
        startNewGame();
      };
    </script>
  </body>
</html>
