<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="概算を使って、5つの商品が予算内に収まるか考える学習ゲームです。"
    />
    <title>概算で予算内に収まるかゲーム</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-board" aria-labelledby="game-title">
        <div class="top-bar">
          <div>
            <p class="eyebrow">概算チャレンジ</p>
            <h1 id="game-title">予算内で全部買える？</h1>
          </div>
          <button class="icon-button" id="new-game-button" type="button" aria-label="新しい問題">
            ↻
          </button>
        </div>

        <div class="status-grid" aria-label="現在の問題">
          <div class="budget-panel">
            <span>今回の予算</span>
            <strong id="budget-text">0円</strong>
          </div>
          <div class="score-panel">
            <span>スコア</span>
            <strong id="score-text">0 / 0</strong>
          </div>
        </div>

        <section class="products-section" aria-labelledby="products-title">
          <div class="section-head">
            <h2 id="products-title">商品と概数</h2>
            <p>各商品の金額を千円単位で丸めて考えよう。</p>
          </div>
          <ul class="product-list" id="product-list"></ul>
        </section>

        <section class="answer-section" aria-labelledby="answer-title">
          <h2 id="answer-title">あなたの答え</h2>
          <div class="choice-row">
            <button class="choice-button yes" id="yes-button" type="button">買える</button>
            <button class="choice-button no" id="no-button" type="button">買えない</button>
          </div>
          <div class="result" id="result" role="status" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
